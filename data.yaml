# Dataset root is relative to this repository so training works across machines.
path: datasets/sapling_pose
train: images/train
val: images/val

# YOLOv8 pose labels store 5 keypoints as [x, y, visibility].
# Order: left tip, left base, right base, right tip, central junction.
kpt_shape: [5, 3] 
names:
  0: sapling
